name: Test Wazuh Rules

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-rules:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install XML validator
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Validate XML rules
        run: |
          if [ -d "rules" ]; then
            for file in rules/*.xml; do
              if [ -f "$file" ]; then
                echo "Validating $file"
                xmllint --noout "$file"
              fi
            done
          else
            echo "Folder rules tidak ditemukan!"
          fi
