name: Test Wazuh Rules

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-rules:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install XML validator
        run: sudo apt-get install -y libxml2-utils

      - name: Validate XML rules
        run: |
          for file in rules/*.xml; do
            echo "Validating $file"
            xmllint --noout $file
          done

      - name: Detect changed files
        id: detect_files
        run: |
          # Ambil daftar file, ganti baris baru dengan \n agar JSON tidak rusak
          FILES=$(git diff --name-only HEAD^ HEAD | grep -E 'rules/.*\.xml|decoders/.*\.xml' || true)
          
          # Jika kosong, beri keterangan
          if [ -z "$FILES" ]; then
            FILES="No XML/Decoders changed"
          fi

          # Format agar ramah di Slack (tambah bullet point dan ganti newline)
          FORMATTED_FILES=$(echo "$FILES" | sed 's/^/- /' | tr '\n' ',' | sed 's/,$//' | sed 's/,/\\n/g')
          
          # Simpan ke environment GitHub agar bisa dibaca step selanjutnya
          echo "CHANGED_FILES=$FORMATTED_FILES" >> $GITHUB_ENV

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.TEST_INT }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            EMOJI="✅"
          else
            EMOJI="❌"
          fi

          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"$EMOJI *WAZUH RULES UPDATE*\n*Status:* ${{ job.status }}\n*Repo:* ${{ github.repository }}\n*Commit:* ${{ github.sha }}\n\n*Changed Files:*\n${{ env.CHANGED_FILES }}\"
          }" $SLACK_WEBHOOK
